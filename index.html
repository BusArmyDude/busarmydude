<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Link-in-Bio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <!-- Toggle Button -->
    <button id="theme-toggle" class="theme-toggle">🌙</button>

    <div class="profile">
        <img src="profile.jpg" alt="Profile Picture" class="profile-pic">
        <div class="name">
            <h1>Your Name</h1>
            <img src="check.png" alt="Verified Badge" class="verified-badge">
        </div>
    </div>

    <div class="social-links">
        <h2>Follow Me</h2>
        <div class="social-icons">
            <a href="https://tiktok.com/@busarmydude" target="_blank"><img src="tiktok-icon.png" alt="TikTok"></a>
            <a href="https://m.twitch.tv/BusArmyDude" target="_blank"><img src="twitch-icon.png" alt="Twitch"></a>
            <a href="https://x.com/KritzarRiver" target="_blank"><img src="x-icon.png" alt="X"></a>
            <a href="https://www.threads.net/@riverkritzar" target="_blank"><img src="threads-icon.png" alt="Threads"></a>
            <!-- Add other icons here -->
        </div>
    </div>

    <div class="links">
        <h2>My Links</h2>
        <div class="link-container">
            <a href="https://riverstechstore24.wordpress.com/" target="_blank">River's Tech Blog</a>
            <a href="https://rivers-merch-store.printify.me/products" target="_blank">River's Merch Store Printify</a>
            <a href="https://riverkritzar-shop.fourthwall.com/" target="_blank">River's Fourthwall Shop</a>
            <!-- Add other links here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
